name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Trigger CyberPanel Git pull
        run: |
          response=$(curl -k -s -w "\n%{http_code}" -X POST ${{ secrets.CPANEL_WEBHOOK_URL }})
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "Deployment failed with HTTP status $http_code"
            exit 1
          fi
